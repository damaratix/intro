name: test-github-actions-new
run-name: just a test
on: [push]
jobs:
  check-bats-version:
    runs-on: ubuntu-latest
    steps:
      - uses:  actions/checkout@v4
      - uses: actions/setup-node@v3
      - uses: github/LeeTann/hello-world-composite-action@v1.0.0
        with:
          node-version: '14'
      - run: npm install -g bats
      - run: bats -v
